<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NAURAAAAAAAA 💖</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#07071a;height:100%;overflow:hidden;font-family:'Cormorant Garamond',serif}
  canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
  #app{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px}

  /* CLOSED BOOK */
  #closed-book{display:flex;align-items:center;justify-content:center;perspective:1000px;cursor:pointer;flex-direction:column;gap:18px}
  #book-3d{width:270px;height:350px;position:relative;transform-style:preserve-3d;transform:rotateY(-28deg) rotateX(7deg);transition:transform 0.5s ease;filter:drop-shadow(0 40px 70px rgba(180,30,60,0.55))}
  #closed-book:hover #book-3d{transform:rotateY(-18deg) rotateX(4deg) scale(1.05)}
  .face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:5px 16px 16px 5px;overflow:hidden}
  #cover-front{background:linear-gradient(155deg,#4a0c1c 0%,#7e1830 45%,#5a1025 80%,#3a0810 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
  #cover-front::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 20px,rgba(255,200,190,0.025) 20px,rgba(255,200,190,0.025) 21px)}
  #cover-front::after{content:'';position:absolute;inset:12px;border:1px solid rgba(255,180,170,0.15);border-radius:10px}
  .orn{width:160px;height:1px;background:linear-gradient(to right,transparent,rgba(255,190,180,0.55),transparent)}
  .orn-sm{width:80px;height:1px;background:linear-gradient(to right,transparent,rgba(255,190,180,0.3),transparent)}
  .cover-title{color:#ffd8d0;font-family:'Playfair Display',serif;font-size:22px;font-style:italic;text-align:center;line-height:1.7;letter-spacing:2px;text-shadow:0 0 30px rgba(255,100,100,0.35)}
  .cover-heart{font-size:28px;color:#ff9090;text-shadow:0 0 20px rgba(255,70,70,0.6);animation:heartbeat 2.5s ease-in-out infinite}
  @keyframes heartbeat{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
  .cover-sub{color:rgba(255,200,190,0.4);font-size:9px;letter-spacing:5px}
  #cover-spine{width:30px;height:100%;position:absolute;left:-30px;top:0;transform:rotateY(-90deg);transform-origin:right center;background:linear-gradient(to bottom,#2e0810,#5e1225,#3e0c18,#5e1225,#2e0810);border-radius:5px 0 0 5px}
  #cover-back{background:#1a0408;transform:rotateY(180deg);border-radius:16px 5px 5px 16px}
  #book-pages{position:absolute;right:0;top:3px;width:calc(100% - 5px);height:calc(100% - 6px);background:repeating-linear-gradient(to right,#f2e8db 0px,#f2e8db 2px,#e8ddd0 2px,#ede3d5 5px);border-radius:0 13px 13px 0;transform:translateZ(-3px)}
  #open-hint{color:rgba(255,195,185,0.5);font-size:10px;letter-spacing:4px;text-align:center;animation:pulse 2.8s infinite}
  @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}

  /* OPEN BOOK */
  #open-book{display:none;flex-direction:column;align-items:center;gap:18px}
  #spread-wrap{perspective:1400px}
  #spread{width:680px;height:430px;position:relative;transform-style:preserve-3d;transform:rotateX(5deg);filter:drop-shadow(0 28px 55px rgba(0,0,0,0.75))}
  #open-spine{position:absolute;left:326px;top:0;width:28px;height:100%;z-index:20;background:linear-gradient(to right,rgba(0,0,0,0.4) 0%,rgba(100,15,30,0.3) 30%,rgba(120,20,40,0.2) 50%,rgba(100,15,30,0.3) 70%,rgba(0,0,0,0.4) 100%);pointer-events:none}
  #open-spine::before{content:'';position:absolute;left:3px;top:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,rgba(60,5,15,0.9),transparent)}
  #open-spine::after{content:'';position:absolute;right:3px;top:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,rgba(60,5,15,0.9),transparent)}
  .open-page{position:absolute;top:0;height:100%;width:326px;background:#fdf5ea;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;overflow:hidden}
  .open-page::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 29px,rgba(160,100,80,0.07) 29px,rgba(160,100,80,0.07) 30px);pointer-events:none}
  #page-left{left:0;border-radius:12px 0 0 12px;border-right:1px solid rgba(160,80,80,0.1);box-shadow:inset -8px 0 18px rgba(0,0,0,0.06)}
  #page-right{right:0;border-radius:0 12px 12px 0;border-left:1px solid rgba(160,80,80,0.1);box-shadow:inset 8px 0 18px rgba(0,0,0,0.06)}
  #page-left::after{content:'';position:absolute;bottom:0;left:0;width:60px;height:60px;background:radial-gradient(ellipse at 0% 100%,rgba(0,0,0,0.1) 0%,transparent 70%);pointer-events:none}
  #page-right::after{content:'';position:absolute;bottom:0;right:0;width:60px;height:60px;background:radial-gradient(ellipse at 100% 100%,rgba(0,0,0,0.1) 0%,transparent 70%);pointer-events:none}

  /* PHOTO SLOT */
  .photo-slot{width:240px;height:330px;border-radius:12px;overflow:hidden;position:relative;background:#e8d8cc;box-shadow:0 4px 20px rgba(0,0,0,0.12)}
  .photo-slot img{width:100%;height:100%;object-fit:cover;display:block;border-radius:12px}
  .photo-slot .no-photo{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,242,238,0.8);border:1.5px dashed rgba(150,70,70,0.28);border-radius:12px}
  .photo-slot img.hidden{display:none}
  .ph-icon{font-size:30px;color:rgba(170,70,70,0.25);margin-bottom:8px}
  .ph-hint{font-size:9px;color:rgba(150,70,70,0.35);text-align:center;line-height:1.8;letter-spacing:1.5px}

  .pnum{position:absolute;bottom:10px;font-size:9px;color:rgba(150,80,80,0.3);letter-spacing:3px}

  /* NAV */
  #nav{display:flex;gap:16px;align-items:center}
  .nbtn{background:transparent;border:1px solid rgba(255,175,165,0.22);color:rgba(255,205,195,0.7);padding:10px 30px;border-radius:40px;cursor:pointer;font-size:11px;font-family:'Cormorant Garamond',serif;letter-spacing:2px;transition:all 0.3s}
  .nbtn:hover{background:rgba(255,140,130,0.1);border-color:rgba(255,140,130,0.45);color:rgba(255,215,205,0.9)}
  .nbtn:disabled{opacity:0.18;cursor:default}
  #pind{color:rgba(255,195,185,0.4);font-size:10px;letter-spacing:3px;min-width:70px;text-align:center}

  @keyframes flipIn{from{opacity:0;transform:rotateX(5deg) rotateY(-6deg) scale(0.98)}to{opacity:1;transform:rotateX(5deg) rotateY(0deg) scale(1)}}
  .flip-anim{animation:flipIn 0.42s cubic-bezier(0.25,0.46,0.45,0.94) forwards}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="app">

  <!-- CLOSED BOOK -->
  <div id="closed-book" onclick="openTheBook()">
    <div id="book-3d">
      <div id="cover-spine"></div>
      <div id="book-pages"></div>
      <div class="face" id="cover-front">
        <div class="orn"></div>
        <div class="orn-sm"></div>
        <div class="cover-heart">♥</div>
        <div class="cover-title">NAURAAA<br>♥</div>
        <div class="orn-sm"></div>
        <div class="orn"></div>
        <div class="cover-sub">foto</div>
      </div>
      <div class="face" id="cover-back"></div>
    </div>
    <div id="open-hint">✦ &nbsp; klik untuk membuka &nbsp; ✦</div>
  </div>

  <!-- OPEN BOOK -->
  <div id="open-book">
    <div id="spread-wrap">
      <div id="spread">
        <div id="open-spine"></div>
        <div class="open-page" id="page-left"></div>
        <div class="open-page" id="page-right"></div>
      </div>
    </div>
    <div id="nav">
      <button class="nbtn" id="btn-prev" onclick="turn(-1)" disabled>← sebelumnya</button>
      <span id="pind">1 / 3</span>
      <button class="nbtn" id="btn-next" onclick="turn(1)">selanjutnya →</button>
    </div>
  </div>

</div>

<script>
  // ============================================================
  // GANTI NAMA FILE FOTO DI SINI
  // Taruh foto kamu di folder "photos/" lalu sesuaikan nama file
  // ============================================================
  const FOTO = [
    'da.jpg',  // halaman 1 (kiri)
    'IMG-20260403-WA0004.jpg',  // halaman 2 (kanan)
    'IMG-20260413-WA0011.jpg',  // halaman 3 (kiri)
    'WhatsApp Image 2026-04-21 at 09.08.20.jpeg',  // halaman 4 (kanan)
    'IMG-20260414-WA0016.jpg',  // halaman 5 (kiri)
    'WhatsApp Image 2026-04-21 at 09.21.44.jpeg',  // halaman 6 (kanan)
  ];
  // ============================================================

  const SPREADS = 3;
  let cur = 0;
  const labels = [['1','2'],['3','4'],['5','6']];

  function openTheBook(){
    const cb = document.getElementById('closed-book');
    cb.style.transition = 'all 0.65s cubic-bezier(0.4,0,0.2,1)';
    cb.style.opacity = '0';
    cb.style.transform = 'scale(0.82) translateY(20px)';
    setTimeout(()=>{
      cb.style.display = 'none';
      const ob = document.getElementById('open-book');
      ob.style.display = 'flex';
      ob.style.opacity = '0';
      ob.style.transition = 'opacity 0.55s ease';
      setTimeout(()=>{ ob.style.opacity = '1'; render(); }, 60);
    }, 600);
  }

  function makeSlot(photoSrc, pageNum){
    const wrap = document.createElement('div');
    wrap.className = 'photo-slot';

    const img = document.createElement('img');
    img.src = photoSrc;
    img.alt = 'Foto kenangan ' + pageNum;
    img.onerror = function(){
      this.classList.add('hidden');
      noPhoto.style.display = 'flex';
    };

    const noPhoto = document.createElement('div');
    noPhoto.className = 'no-photo';
    noPhoto.style.display = 'none';
    noPhoto.innerHTML = '<div class="ph-icon">♡</div><div class="ph-hint">foto' + pageNum + '.jpg<br>belum ada</div>';

    wrap.appendChild(img);
    wrap.appendChild(noPhoto);
    return wrap;
  }

  function render(){
    const pl = document.getElementById('page-left');
    const pr = document.getElementById('page-right');

    pl.innerHTML = '<span class="pnum">' + labels[cur][0] + '</span>';
    pr.innerHTML = '<span class="pnum">' + labels[cur][1] + '</span>';

    pl.appendChild(makeSlot(FOTO[cur * 2], cur * 2 + 1));
    pr.appendChild(makeSlot(FOTO[cur * 2 + 1], cur * 2 + 2));

    document.getElementById('pind').textContent = (cur + 1) + ' / ' + SPREADS;
    document.getElementById('btn-prev').disabled = cur === 0;
    document.getElementById('btn-next').disabled = cur === SPREADS - 1;
  }

  function turn(d){
    cur = Math.max(0, Math.min(SPREADS - 1, cur + d));
    const sp = document.getElementById('spread');
    sp.style.opacity = '0';
    setTimeout(()=>{
      render();
      sp.classList.remove('flip-anim');
      void sp.offsetWidth;
      sp.classList.add('flip-anim');
      sp.style.opacity = '1';
    }, 300);
  }

  // STARS
  const cv = document.getElementById('canvas'), cx = cv.getContext('2d');
  let W, H, stars = [];
  function resize(){ W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
  function initStars(){
    stars = [];
    for(let i = 0; i < 280; i++) stars.push({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.6+0.2,
      vy: Math.random()*0.14+0.03,
      tw: Math.random()*Math.PI*2,
      ts: Math.random()*0.022+0.006,
      op: Math.random()*0.65+0.2,
      warm: Math.random() > 0.85
    });
  }
  function drawStars(){
    cx.fillStyle = '#07071a'; cx.fillRect(0,0,W,H);
    for(const s of stars){
      s.tw += s.ts;
      const a = s.op*(0.4+0.6*Math.sin(s.tw));
      cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      cx.fillStyle = s.warm ? `rgba(255,220,180,${a})` : `rgba(255,225,225,${a})`;
      cx.fill();
      s.y -= s.vy;
      if(s.y < -2){ s.y = H+2; s.x = Math.random()*W; }
    }
    requestAnimationFrame(drawStars);
  }
  window.addEventListener('resize', ()=>{ resize(); initStars(); });
  resize(); initStars(); requestAnimationFrame(drawStars);
</script>
</body>
</html>
